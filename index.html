<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio</title>
    <style>
        :root {
            --nv-green: #76b900;
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOGIN SCREEN */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .auth-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h2 { margin-top: 0; font-weight: 500; }
        .auth-box input {
            width: 90%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            outline: none;
            transition: 0.2s;
        }
        .auth-box input:focus { border-color: var(--nv-green); }
        .auth-box button {
            width: 100%;
            background: var(--nv-green);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-box button:hover { background: #88d400; }

        /* CHAT INTERFACE */
        #chat-interface {
            display: none;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { font-weight: 600; font-size: 1.2em; display: flex; align-items: center; gap: 10px;}
        .header-title span { color: var(--nv-green); }
        
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* CHAT BUBBLES */
        .message-wrapper { display: flex; flex-direction: column; }
        .role-label { font-size: 0.8em; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .message {
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95em;
        }
        .user-message {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            align-self: flex-end;
            max-width: 80%;
        }
        .ai-message {
            background: transparent;
            border-left: 3px solid var(--nv-green);
            align-self: flex-start;
            width: 100%;
        }

        /* INPUT AREA */
        .input-container {
            padding: 20px;
            background: var(--bg-dark);
        }
        .input-box {
            display: flex;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px;
        }
        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 15px;
            outline: none;
            font-size: 1em;
        }
        .input-box button {
            background: var(--nv-green);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-box button:hover { background: #88d400; }
        
        /* TYPING INDICATOR */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--nv-green);
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h2>NVIDIA // AI Studio</h2>
            <input type="text" id="username" placeholder="Username (admin)" autocomplete="off">
            <input type="password" id="password" placeholder="Password (admin123)">
            <button onclick="login()">Sign In</button>
            <p id="auth-error" style="color:#ff5555; text-align:center; display:none; margin-top:15px; font-size:0.9em;">Invalid credentials</p>
        </div>
    </div>

    <div id="chat-interface">
        <div class="header">
            <div class="header-title">DeepSeek-V3 <span>Studio</span></div>
            <button onclick="logout()" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 15px; border-radius: 6px; cursor: pointer;">Sign Out</button>
        </div>
        
        <div id="chat-history"></div>
        
        <div class="input-container">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Ask the model something..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Default DB Initialization
        if (!localStorage.getItem("cyber_users")) {
            localStorage.setItem("cyber_users", JSON.stringify({ "admin": { pass: "admin123" } }));
        }

        let currentUser = null;

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const db = JSON.parse(localStorage.getItem("cyber_users"));

            if (db[user] && db[user].pass === pass) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
                appendMessage('ai', 'Authentication successful. DeepSeek-V3 engine ready.');
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('chat-history').innerHTML = '';
            document.getElementById('chat-interface').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }

        // The Smooth Typing Animation Engine
        async function typeWriterEffect(element, text, speed = 10) {
            element.innerHTML = "";
            let cursorHTML = '<span class="cursor"></span>';
            
            for (let i = 0; i < text.length; i++) {
                element.innerHTML = text.substring(0, i + 1) + cursorHTML;
                // Add a tiny random delay to make it look like real network streaming
                await new Promise(r => setTimeout(r, speed + (Math.random() * 10))); 
            }
            // Remove cursor when done
            element.innerHTML = text;
        }

        function appendMessage(role, text, isTyping = false) {
            const history = document.getElementById("chat-history");
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper";
            
            const label = document.createElement("div");
            label.className = "role-label";
            label.innerText = role === 'user' ? currentUser : 'AI Assistant';
            
            const bubble = document.createElement("div");
            bubble.className = `message ${role}-message`;
            
            if (isTyping) {
                bubble.innerHTML = '<span class="cursor"></span>';
            } else {
                bubble.innerText = text;
            }

            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            history.appendChild(wrapper);
            history.scrollTop = history.scrollHeight;

            return bubble; // Return the bubble so we can inject typing animation into it later
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Show User Message
            appendMessage('user', message);
            inputField.value = "";

            // 2. Create an empty AI bubble for the animation
            const aiBubble = appendMessage('ai', '', true);

            try {
                // 3. Fetch from your Vercel backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // 4. Trigger the smooth NVIDIA streaming animation
                await typeWriterEffect(aiBubble, data.reply, 15);
                
            } catch (error) {
                aiBubble.innerHTML = "<span style='color:#ff5555'>Error connecting to API. Please check your network.</span>";
            }
            
            document.getElementById("chat-history").scrollTop = document.getElementById("chat-history").scrollHeight;
        }
    </script>
</body>
</html>
